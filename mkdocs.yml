site_name: MENoBiS
site_description: Max Entropy NOn Binary Suite for null modeling
repo_url: ''
edit_uri: ''

theme:
  name: material
  language: en
  features:
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Thesis Context: thesis-context.md
  - Getting Started: getting-started.md
  - Concepts:
      - Multi-edge Networks: concepts/multi-edge-networks.md
      - Maximum Entropy Models: concepts/maximum-entropy-models.md
      - Thesis Cases: concepts/thesis-cases.md
      - Spatial Costs: concepts/spatial-costs.md
      - W Ensemble: concepts/w-ensemble.md
      - Partial Constraints: concepts/partial-constraints.md
      - Statistical Filtering: concepts/statistical-filtering.md
      - Ensembles: concepts/ensembles.md
  - API:
      - Python: api/python.md
      - Rust: api/rust.md
      - Network Metrics: api/network-metrics.md
      - Filtering: api/filtering.md
  - CLI:
      - Analyze: cli/analyze.md
      - Fit: cli/fit.md
      - Generate: cli/generate.md
      - Filter: cli/filter.md
      - Convert: cli/convert.md
  - Development:
      - Testing: development/testing.md
      - Benchmarking: development/benchmarking.md
      - Benchmark Results: development/benchmark-results.md
      - Scalability: development/scalability.md
      - v2 Readiness Audit: development/v2-readiness-audit.md
      - Ontology Conformance Audit: development/ontology-conformance-audit.md
      - Contributing and Extending: development/contributing-and-extending.md
      - Release Process: development/release-process.md
  - Decisions:
      - Rust and Python Architecture: decisions/0001-rust-python-architecture.md
      - Streaming Generation: decisions/0002-streaming-generation.md
      - Provider Pipeline: decisions/0003-provider-pipeline.md
      - W Conic Solver Boundary: decisions/0004-w-conic-solver-boundary.md
      - Fitting Failure Policy: decisions/0005-fitting-failure-policy.md
      - PA Geographic Benchmark Fixture: decisions/0007-pa-geographic-benchmark-fixture.md
      - Saturation Peeling: decisions/0008-saturation-peeling.md
      - External Graph Libraries: decisions/0009-external-graph-libraries.md
      - Python Domain Layout: decisions/0010-python-domain-layout.md
      - Archive Legacy Thesis Folders: decisions/0011-archive-legacy-thesis-folders.md
      - Solver Performance Optimization: decisions/0012-solver-performance-optimization.md
      - Project Rename to MENoBiS: decisions/0013-project-rename.md
      - Sparse Pair Mask: decisions/0014-sparse-pair-mask.md

plugins:
  - search
  - mkdocstrings

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

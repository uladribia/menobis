site_name: MENoBiS
site_description: Max Entropy NOn Binary Suite for null modeling
site_url: https://uladribia.github.io/menobis/
repo_url: https://github.com/uladribia/menobis
edit_uri: edit/master/docs/

theme:
  name: material
  language: en
  features:
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Start here:
      - Home: index.md
      - Getting started: getting-started.md
      - Main use cases: examples/main-use-cases.ipynb
      - Thesis and citations: thesis-context.md
  - Tutorials:
      - Filter a network: tutorials/filter-network.md
      - Sample ensemble magnitudes: tutorials/sample-ensemble-magnitudes.md
      - Use spatial costs: tutorials/use-spatial-costs.md
  - Model selection and maths:
      - Choose a null model: concepts/choose-null-model.md
      - Equations: concepts/equations.md
      - Partial constraints: concepts/partial-constraints.md
      - Solvers and scaling: concepts/solvers-and-scaling.md
      - Filtering statistics: concepts/filtering.md
  - Reference:
      - Python API: api/python.md
      - File formats: api/file-formats.md
      - Filtering API: api/filtering.md
      - Network metrics: api/network-metrics.md
      - Rust API: api/rust.md
      - CLI:
          - Fit: cli/fit.md
          - Generate: cli/generate.md
          - Filter: cli/filter.md
  - Development:
      - Extending thesis cases: development/extending-thesis-cases.md
      - Testing: development/testing.md
      - Benchmarking: development/benchmarking.md
      - Scalability: development/scalability.md
      - Fetching real-world data: development/fetching-data.md
      - Release process: development/release-process.md
      - TODOs: development/todos.md

plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      include_source: true
  - mkdocstrings

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

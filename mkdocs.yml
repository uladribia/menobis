site_name: ODME
site_description: Origin-Destination Multi-Edge network models
repo_url: ''
edit_uri: ''

theme:
  name: material
  language: en
  features:
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Thesis Context: thesis-context.md
  - Getting Started: getting-started.md
  - Concepts:
      - Multi-edge Networks: concepts/multi-edge-networks.md
      - Maximum Entropy Models: concepts/maximum-entropy-models.md
      - Thesis Cases: concepts/thesis-cases.md
      - Spatial Costs: concepts/spatial-costs.md
      - W Ensemble: concepts/w-ensemble.md
      - Partial Constraints: concepts/partial-constraints.md
      - Statistical Filtering: concepts/statistical-filtering.md
      - Ensembles: concepts/ensembles.md
  - API:
      - Python: api/python.md
      - Rust: api/rust.md
      - Filtering: api/filtering.md
  - CLI:
      - Analyze: cli/analyze.md
      - Fit: cli/fit.md
      - Generate: cli/generate.md
      - Filter: cli/filter.md
      - Convert: cli/convert.md
  - Development:
      - Testing: development/testing.md
      - Benchmarking: development/benchmarking.md
      - Scalability: development/scalability.md
      - Release Process: development/release-process.md
  - Decisions:
      - Rust and Python Architecture: decisions/0001-rust-python-architecture.md
      - Streaming Generation: decisions/0002-streaming-generation.md
      - Provider Pipeline: decisions/0003-provider-pipeline.md
      - W Conic Solver Boundary: decisions/0004-w-conic-solver-boundary.md
      - Fitting Failure Policy: decisions/0005-fitting-failure-policy.md
      - API Consistency Audit: decisions/0006-api-consistency-audit.md

plugins:
  - search
  - mkdocstrings

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
